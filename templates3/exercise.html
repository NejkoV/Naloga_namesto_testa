<h2>🌦️ Vremenska napoved</h2>

<a href="/">⬅ Nazaj</a>
<p>Vnesi kraj za vremensko stanje. POZOR: in vsakič na novo vnesi datum tudi če je isti.</p>

<hr>

<input id="exerciseInput" placeholder="npr Kranj">
<input id="dateInput" type="date">
<button onclick="getExercise()">Vremenska Napoved</button>

<p id="result"></p>
<script>
function getExercise() {
  const q = document.getElementById("exerciseInput").value.trim();
  const date = document.getElementById("dateInput").value || "";

  if (!q) {
    document.getElementById("result").innerText = "Vnesi kraj.";
    return;
  }

  document.getElementById("result").innerText = "Nalagam...";

  fetch(`/exercise_info?q=${encodeURIComponent(q)}&date=${encodeURIComponent(date)}&_=${Date.now()}`)
    .then(res => res.json())
    .then(e => {

      if (!e || Object.keys(e).length === 0) {
        document.getElementById("result").innerText = "Ni podatkov.";
        return;
      }

      if (e.info) {
        document.getElementById("result").innerText = e.info;
        return;
      }

      let text = "";

      text += "🌍 " + (e.name || "Unknown") + "\n";

      if (e.date) text += "📅 " + e.date + "\n";
      if (e.temp_max !== undefined) text += "🌡️ Max: " + e.temp_max + "°C\n";
      if (e.temp_min !== undefined) text += "🌡️ Min: " + e.temp_min + "°C\n";
      if (e.windspeed !== undefined) text += "💨 Wind: " + e.windspeed + " km/h\n";
      if (e.weathercode !== undefined) text += "☁️ Code: " + e.weathercode + "\n";
      if (e.weather_desc !== undefined) text += "☁️ " + e.weather_desc + "\n";

      document.getElementById("result").innerText = text;
    })
    .catch((err) => {
      console.log(err);
      document.getElementById("result").innerText = "Napaka pri API klicu";
    });
}
</script>
