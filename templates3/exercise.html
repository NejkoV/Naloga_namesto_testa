<h2>🌦️ Vremenska napoved</h2>

<a href="/">⬅ Nazaj</a>
<p>Vnesi kraj za vremensko stanje:</p>

<hr>

<input id="exerciseInput" placeholder="npr Kranj">
<input id="dateInput" type="date">
<button onclick="getExercise()">Vremenska Napoved</button>

<p id="result"></p>
<script>
function getExercise() {
  const q = document.getElementById("exerciseInput").value.trim();
  const date = document.getElementById("dateInput").value || "";

  const result = document.getElementById("result");

  if (!q) {
    result.innerText = "Vnesi kraj.";
    return;
  }

  // 🔥 FULL RESET
  result.innerText = "Nalagam...";

  fetch(`/exercise_info?q=${encodeURIComponent(q)}&date=${encodeURIComponent(date)}&_=${Date.now()}`)
    .then(res => res.json())
    .then(e => {

      // 🔥 CLEAN START
      result.innerText = "";

      if (!e || e.error) {
        result.innerText = e.error || "Ni podatkov";
        return;
      }

      let text = "";
      text += "🌍 " + e.name + "\n";
      text += "📅 " + e.date + "\n";
      text += "🌡️ Max: " + e.temp_max + "°C\n";
      text += "🌡️ Min: " + e.temp_min + "°C\n";
      text += "☁️ " + e.weather_desc + "\n";

      result.innerText = text;
    })
    .catch(err => {
      console.log(err);
      result.innerText = "Napaka pri API klicu";
    });
}
</script>
