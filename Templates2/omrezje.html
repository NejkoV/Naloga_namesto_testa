<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The GOON club</title>
</head>
<body>
<h2>Dobrodošel, {{ user }}</h2>

<!-- 1. Text area za tvojo objavo -->
<form id="noteForm" method="POST" enctype="multipart/form-data">
    <textarea id="noteText" name="note" rows="4" cols="50" placeholder="Napiši novo objavo..."></textarea>

    <!-- Dodajanje slike -->
    <input type="file" name="image"><br>
    
    <button type="submit">Shrani objavo</button>
</form>


<!-- 2. Gumb za nazaj na login -->
<button onclick="window.location.href='/login'">Nazaj na Login</button>

<hr>

<!-- 3. Gumb za seznam uporabnikov -->
<button onclick="loadUsers()">Prikaži uporabnike</button>

<!-- 4. Seznam uporabnikov -->
<ul id="userList"></ul>

</body>

<script>
// 🔹 SHRANJEVANJE OBJAVE
document.getElementById("noteForm").addEventListener("submit", function(e){
    e.preventDefault();

    const note = document.getElementById("noteText").value;
    const fileInput = document.querySelector('input[type="file"]');

    const formData = new FormData();
    formData.append('note', note);

    if (fileInput.files.length > 0) {
        formData.append('image', fileInput.files[0]);
    }

    fetch("/omrezje", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(msg => {
        alert("Objava shranjena!");

        document.getElementById("noteForm").reset();
        document.getElementById("noteText").focus();
    });
});


// 🔹 NALOŽI UPORABNIKE
function loadUsers() {
    fetch("/users")
        .then(res => res.json())
        .then(users => {
            const list = document.getElementById("userList");
            list.innerHTML = "";

            users.forEach(user => {
                const li = document.createElement("li");
                li.innerHTML = `<button onclick="loadProfile('${user}')">${user}</button>`;
                list.appendChild(li);
            });
        })
        .catch(err => console.error("Napaka:", err));
}


// 🔹 PREUSMERI NA PROFIL
function loadProfile(username) {
    window.location.href = `/user/${username}`;
}


// 🔹 AUTO LOAD
window.onload = function() {
    loadUsers();
};
</script>
